version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: turnos_db
    environment:
      POSTGRES_USER: turnos_user
      POSTGRES_PASSWORD: turnos_password
      POSTGRES_DB: turnos_db
    ports:
      - "5444:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U turnos_user -d turnos_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: turnos_backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://turnos_user:turnos_password@db:5432/turnos_db
      - JWT_SECRET=${JWT_SECRET:-super_secreto_jwt_development}
      - PORT=3000
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000/api
    container_name: turnos_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
